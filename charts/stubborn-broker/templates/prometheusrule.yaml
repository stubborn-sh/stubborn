{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "stubborn-broker.fullname" . }}
  labels:
    {{- include "stubborn-broker.labels" . | nindent 4 }}
spec:
  groups:
    - name: stubborn-broker
      rules:
        - alert: HighErrorRate
          expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.01
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High HTTP 5xx error rate"
            description: "Stubborn broker {{ "{{" }} $labels.instance {{ "}}" }} has a 5xx error rate above 0.01/s for 5 minutes."
            runbook_url: "https://github.com/stubborn-sh/stubborn/blob/main/INCIDENTS.md#2-high-latency"
        - alert: CircuitBreakerOpen
          expr: resilience4j_circuitbreaker_state{state="open"} == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Circuit breaker open"
            description: "Circuit breaker {{ "{{" }} $labels.name {{ "}}" }} on {{ "{{" }} $labels.instance {{ "}}" }} is in open state."
            runbook_url: "https://github.com/stubborn-sh/stubborn/blob/main/INCIDENTS.md#3-circuit-breaker-open"
        - alert: HighLatency
          expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High P95 latency"
            description: "P95 latency on {{ "{{" }} $labels.instance {{ "}}" }} exceeds 1 second for 5 minutes."
            runbook_url: "https://github.com/stubborn-sh/stubborn/blob/main/INCIDENTS.md#2-high-latency"
        - alert: DatabaseConnectionPoolExhausted
          expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Database connection pool near exhaustion"
            description: "HikariCP active connections on {{ "{{" }} $labels.instance {{ "}}" }} exceed 90% of max pool size."
            runbook_url: "https://github.com/stubborn-sh/stubborn/blob/main/INCIDENTS.md#1-database-unreachable"
{{- end }}
