name: Deploy Demo
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'liberica'

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-demo
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build OCI image with Spring Boot Buildpacks
        run: ./mvnw spring-boot:build-image -pl broker -am -DskipTests -Dspring-boot.build-image.imageName=registry.fly.io/stubborn-demo:latest

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Push image to Fly.io registry
        run: |
          flyctl auth docker
          docker push registry.fly.io/stubborn-demo:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy pre-built image
        run: flyctl deploy --image registry.fly.io/stubborn-demo:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
