name: Deploy Demo
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'liberica'
  DEMO_URL: 'https://demo.stubborn.sh'

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-demo
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build OCI image with Spring Boot Buildpacks
        run: ./mvnw clean install spring-boot:build-image -pl broker -am -DskipTests

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Tag and push image to Fly.io registry
        run: |
          flyctl auth docker
          IMAGE_NAME=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'stubborn' | head -1)
          echo "Built image: $IMAGE_NAME"
          docker tag "$IMAGE_NAME" registry.fly.io/stubborn-demo:latest
          docker push registry.fly.io/stubborn-demo:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy pre-built image
        run: flyctl deploy --image registry.fly.io/stubborn-demo:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    name: Post-Deploy Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf "${{ env.DEMO_URL }}/actuator/health" | grep -q "UP"; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app... attempt $i"
            sleep 10
          done
          echo "App did not become ready in time"
          exit 1

      - name: Run Playwright smoke test
        run: npx playwright test tests/demo-smoke.spec.ts --reporter=list
        env:
          DEMO_URL: ${{ env.DEMO_URL }}

      - name: Upload smoke test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: demo-smoke-screenshots
          path: test-results/
          retention-days: 7
