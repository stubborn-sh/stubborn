name: Deploy Demo
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'liberica'
  DEMO_URL: 'https://demo.stubborn.sh'

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-demo
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build OCI image with Spring Boot Buildpacks
        run: ./mvnw package -DskipTests -B && ./mvnw spring-boot:build-image -pl broker -DskipTests -B

      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # v1.5

      - name: Tag and push image to Fly.io registry
        run: |
          flyctl auth docker
          IMAGE_NAME=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'stubborn' | head -1)
          echo "Built image: $IMAGE_NAME"
          docker tag "$IMAGE_NAME" registry.fly.io/stubborn-demo:latest
          docker push registry.fly.io/stubborn-demo:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy pre-built image
        run: flyctl deploy --image registry.fly.io/stubborn-demo:latest
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    name: Post-Deploy Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf "${{ env.DEMO_URL }}/actuator/health" | grep -q "UP"; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app... attempt $i"
            sleep 10
          done
          echo "App did not become ready in time"
          exit 1

      - name: Run Playwright smoke test
        run: npx playwright test tests/demo-smoke.spec.ts --reporter=list
        env:
          DEMO_URL: ${{ env.DEMO_URL }}

      - name: Copy screenshots to docs
        if: success()
        run: |
          cp -f test-results/01-dashboard.png docs/screenshots/demo-dashboard.png 2>/dev/null || true
          cp -f test-results/02-applications.png docs/screenshots/demo-applications.png 2>/dev/null || true
          cp -f test-results/03-contracts.png docs/screenshots/demo-contracts.png 2>/dev/null || true
          cp -f test-results/07-topics.png docs/screenshots/demo-topics.png 2>/dev/null || true
          cp -f test-results/08-messaging-contract.png docs/screenshots/demo-messaging-contract.png 2>/dev/null || true
          cp -f test-results/09-graph-messaging.png docs/screenshots/demo-graph-messaging.png 2>/dev/null || true

      - name: Upload smoke test screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: demo-smoke-screenshots
          path: test-results/
          retention-days: 7
