name: Publish Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  repository_dispatch:
    types: [contract-docs-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Unified Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Checkout stubborn-contract repo (public, no token required)
      - uses: actions/checkout@v4
        with:
          repository: stubborn-sh/stubborn-contract
          path: stubborn-contract

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build broker VitePress docs → _site/stubborn/
      - name: Install broker docs dependencies
        run: npm install
        working-directory: docs

      - name: Build broker docs
        run: npm run docs:build
        working-directory: docs

      - name: Copy broker docs to _site
        run: |
          mkdir -p _site/stubborn
          cp -r docs/.vitepress/dist/. _site/stubborn/

      # Build stubborn-contract VitePress docs → _site/contract/
      - name: Install contract docs dependencies
        run: npm install
        working-directory: stubborn-contract

      - name: Build contract docs
        run: npm run docs:build
        working-directory: stubborn-contract

      - name: Copy contract docs to _site
        run: |
          mkdir -p _site/contract
          cp -r stubborn-contract/docs/.vitepress/dist/. _site/contract/

      # Root landing page (redirects to /stubborn/) + custom domain
      - name: Create root landing page and CNAME
        run: |
          cp docs/public/hub.html _site/index.html
          echo "docs.stubborn.sh" > _site/CNAME

      # Verify no broken links in either site
      - name: Check broker docs links
        run: bash scripts/check-docs-links.sh
        env:
          DIST: _site/stubborn
          PORT: 4173

      - name: Check contract docs links
        run: bash scripts/check-docs-links.sh
        env:
          DIST: _site/contract
          PORT: 4174

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
