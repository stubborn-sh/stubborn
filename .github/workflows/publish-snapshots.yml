name: Publish Snapshots

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'liberica'

jobs:
  publish:
    name: Publish Snapshots to Maven Central
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD

      - name: Verify version is SNAPSHOT
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout -pl build-parent)
          if [[ ! "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Version $VERSION is not a SNAPSHOT — skipping snapshot publish"
            exit 1
          fi
          echo "Publishing snapshot: $VERSION"

      - name: Build and test broker (generates RestDocs stubs)
        run: ./mvnw install -pl !e2e-tests

      - name: Deploy Java modules to Maven Central
        run: ./mvnw deploy -Ppublish -DskipTests -pl build-parent,ui,broker,broker-api-client,broker-stub-downloader,broker-contract-publisher,broker-maven-plugin,stub-runner,openapi-validator
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}

      - name: Build Docker image
        continue-on-error: true
        run: ./mvnw spring-boot:build-image -pl broker -DskipTests

      - name: Push Docker image
        continue-on-error: true
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout -pl build-parent)
          docker push "mgrzejszczak/stubborn:${VERSION}"

