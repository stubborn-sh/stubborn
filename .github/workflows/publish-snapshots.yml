name: Publish Snapshots

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'liberica'

jobs:
  publish:
    name: Publish Snapshots to Maven Central
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD

      - name: Verify version is SNAPSHOT
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout -pl build-parent)
          if [[ ! "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Version $VERSION is not a SNAPSHOT — skipping snapshot publish"
            exit 1
          fi
          echo "Publishing snapshot: $VERSION"

      - name: Deploy snapshots
        run: ./mvnw deploy -Ppublish -DskipTests -Dskip.npm -pl !e2e-tests,!ui,!js,!broker-gradle-plugin
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
