request:
  method: POST
  url: /api/orders
  headers:
    Content-Type: application/json
  body:
    product: "iPhone 16"
    amount: 999.99
response:
  status: 201
  headers:
    Content-Type: application/json
  body:
    product: "iPhone 16"
    amount: 999.99
    status: "CREATED"
  matchers:
    body:
      - path: $.id
        type: by_regex
        value: "[0-9]+"
