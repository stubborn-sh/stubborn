request:
  method: POST
  urlPath: /api/products
  headers:
    Content-Type: application/json
  body:
    name: "iPhone 16"
    price: 999.99
response:
  status: 201
  headers:
    Content-Type: application/json
  body:
    name: "iPhone 16"
    price: 999.99
    inStock: true
  matchers:
    body:
      - path: $.id
        type: by_regex
        value: "[0-9]+"
