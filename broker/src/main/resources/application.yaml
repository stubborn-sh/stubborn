spring:
  application:
    name: stubborn
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/broker}
    username: ${DATABASE_USERNAME:broker}
    password: ${DATABASE_PASSWORD:broker}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  docker:
    compose:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,circuitbreakers
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        enabled: ${OTEL_METRICS_ENABLED:false}
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  prometheus:
    metrics:
      export:
        enabled: ${PROMETHEUS_ENABLED:false}
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: ${SERVER_PORT:8642}
  shutdown: graceful

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state:
          seconds: 30
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      database:
        base-config: default
      webhookDispatch:
        base-config: default
        slow-call-duration-threshold:
          seconds: 10
        slow-call-rate-threshold: 80
      mavenImport:
        base-config: default
        slow-call-duration-threshold:
          seconds: 30
        slow-call-rate-threshold: 80
      gitImport:
        base-config: default
        slow-call-duration-threshold:
          seconds: 60
        slow-call-rate-threshold: 80

broker:
  credentials:
    encryption-key: '' # Base64-encoded AES-256 key. Empty = no encryption (dev mode)

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
