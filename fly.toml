app = 'stubborn-demo'
primary_region = 'arn'

[build]
  builder = 'paketobuildpacks/builder-jammy-base'
  [build.args]
    BP_JVM_VERSION = '25'
    BP_MAVEN_BUILT_ARTIFACT = 'broker/target/stubborn-broker-*-exec.jar'
    BP_MAVEN_BUILD_ARGUMENTS = '-pl broker -am -DskipTests package'

[env]
  SPRING_PROFILES_ACTIVE = 'demo'
  SERVER_PORT = '8080'
  JAVA_TOOL_OPTIONS = '-Dserver.port=8080 -XX:MaxRAMPercentage=75'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "180s"
  interval = "15s"
  method = "GET"
  path = "/actuator/health"
  timeout = "10s"

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
