app = 'stubborn-demo'
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile.demo'

[env]
  SPRING_PROFILES_ACTIVE = 'demo'
  SERVER_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
