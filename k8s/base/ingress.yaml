apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spring-cloud-contract-broker
  labels:
    app.kubernetes.io/name: spring-cloud-contract-broker
    app.kubernetes.io/part-of: spring-cloud-contract-broker
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spring-cloud-contract-broker
                port:
                  number: 80
